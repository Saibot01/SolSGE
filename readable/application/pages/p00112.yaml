- # ====== Dynamic Action: Carga de Productos ==================
  id: 20585643614245338
  identification: 
    name: Carga de Productos

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Column(s)
    interactive-grid: Detalle_Orden_Compra # 33426158536642141
    column(s): 
    - ID_PRODUCTO

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 20586164527245339
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        /*select 1, cat.precio, cat.precio 
        into :CANTIDAD,:PRECIO_UNITARIO, :TOTAL_DETALLE
        from productos pro, PRODUCTO_PROVEEDORES  cat
            where pro.id_producto = cat.id_producto
            and cat.ID_PERSONA = :P112_ID_PROVEEDOR
            and pro.id_producto = :ID_PRODUCTO;*/
        
        SELECT 1, vv.PRECIO, vv.PRECIO
        INTO   :CANTIDAD, :PRECIO_UNITARIO, :TOTAL_DETALLE
        FROM   V_PRODUCTO_PROVEEDOR_VIGENTE vv
        WHERE  vv.ID_PERSONA  = :P112_ID_PROVEEDOR
          AND  vv.ID_PRODUCTO = :ID_PRODUCTO
          AND  vv.VIGENCIA    = 'VIGENTE';
      items-to-submit: 
      - ID_PRODUCTO
      - ' P112_ID_PROVEEDOR'
      items-to-return: 
      - CANTIDAD
      - PRECIO_UNITARIO
      - TOTAL_DETALLE
      suppress-change-event: false

    execution: 
      sequence: 20
      event: Carga de Productos # 20585643614245338
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 20586699485245339
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: recalculaImporte();

    execution: 
      sequence: 30
      event: Carga de Productos # 20585643614245338
      fire-when-event-result-is: True
      fire-on-initialization: false

