- # ====== Process: PRC_VAL_NO_PROPIA_OC =======================
  id: 20606517262469414
  identification: 
    name: PRC_VAL_NO_PROPIA_OC
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_aprobador NUMBER;
      BEGIN
        SELECT ID_EMPLEADO INTO l_aprobador
        FROM   EMPLEADOS
        WHERE  CODIGO_USUARIO = :APP_USER;
      
        IF l_aprobador = :P112_ID_EMPLEADO THEN
          APEX_ERROR.ADD_ERROR(
            P_MESSAGE          => 'No puede aprobar o rechazar una orden de compra propia.',
            P_DISPLAY_LOCATION => APEX_ERROR.C_INLINE_IN_NOTIFICATION
          );
        END IF;
      EXCEPTION
        WHEN NO_DATA_FOUND THEN NULL;
      END;

  execution: 
    sequence: 1
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: APROBAR # 20606349507469412

