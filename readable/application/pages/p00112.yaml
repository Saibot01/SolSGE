- # ====== Process: PRC_APROBAR_OC =============================
  id: 20606858657469417
  identification: 
    name: PRC_APROBAR_OC
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_id_aprobador NUMBER;
      BEGIN
        SELECT ID_EMPLEADO INTO l_id_aprobador
        FROM   EMPLEADOS
        WHERE  CODIGO_USUARIO = :APP_USER;
      
        UPDATE ORDENES_COMPRA SET
          ESTADO           = 'P',
          ID_APROBADOR     = l_id_aprobador,
          FECHA_APROBACION = SYSDATE
        WHERE ID_ORDEN_COMPRA = :P112_ID_ORDEN_COMPRA
          AND ESTADO          = 'B';
      
        IF SQL%ROWCOUNT = 0 THEN
          RAISE_APPLICATION_ERROR(-20001, 
            'La orden ya fue procesada o no está disponible.');
        END IF;
      END;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: APROBAR # 20606349507469412

- # ====== Process: PRC_RECHAZAR_OC ============================
  id: 20606991300469418
  identification: 
    name: PRC_RECHAZAR_OC
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_id_aprobador NUMBER;
      BEGIN
        SELECT ID_EMPLEADO INTO l_id_aprobador
        FROM   EMPLEADOS
        WHERE  CODIGO_USUARIO = :APP_USER;
      
        UPDATE ORDENES_COMPRA SET
          ESTADO           = 'X',
          ID_APROBADOR     = l_id_aprobador,
          FECHA_APROBACION = SYSDATE,
          MOTIVO_RECHAZO   = :P112_MOTIVO_RECHAZO
        WHERE ID_ORDEN_COMPRA = :P112_ID_ORDEN_COMPRA
          AND ESTADO          = 'B';
      
        IF SQL%ROWCOUNT = 0 THEN
          RAISE_APPLICATION_ERROR(-20001, 
            'La orden ya fue procesada o no está disponible.');
        END IF;
      END;

