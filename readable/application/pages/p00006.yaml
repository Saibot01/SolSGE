regions: 
- # ====== Region: New =========================================
  id: 12003587784524704
  identification: 
    name: New
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        CURSOR cr_orden IS
          SELECT 
          PE.PRIMER_NOMBRE || ' ' || PE.SEGUNDO_NOMBRE || ' ' || PE.PRIMER_APELLIDO || ' ' || PE.SEGUNDO_APELLIDO AS DATOS,
          PE.NRO_DOCUMENTO,
          VE.ID_ORDEN,
          VE.FECHA_ORDEN,
          VE.TOTAL,
          VE.OBSERVACION FROM  ORDENES_VENTA VE, PERSONAS PE
      WHERE PE.ID_PERSONA = VE.ID_PERSONA
          AND ID_ORDEN = :P6_ID_ORDEN;
      
        CURSOR cr_detalles (p_id_orden NUMBER) IS
          SELECT PR.NOMBRE,
              DE.CANTIDAD,
              DE.PRECIO_UNITARIO
               FROM DETALLE_ORDEN DE, PRODUCTOS PR
      WHERE DE.ID_PRODUCTO = PR.ID_PRODUCTO
           AND DE.ID_ORDEN = p_id_orden
           ORDER BY DE.ID_ORDEN;
      
        v_retorno CLOB;
      BEGIN
        FOR v_orden IN cr_orden LOOP
          v_retorno := '
          <header>
            <h1>ORDEN DE VENTA</h1>
            <address>
              <h5> RUC: 80004571-1<br>Denominacion: SOLSGE<br>Direccion: Itauguá Km 25 Mboiy<br>Inicio Actividad: 31/10/2023</h5>
            </address>
            <h1>RECEPTOR</h1>
            <address>
              <h5>RUC/CEDULA IDENTIDAD: ' || V_ORDEN.NRO_DOCUMENTO || '<br>NOMBRE/RAZÓN SOCIAL: ' || V_ORDEN.DATOS || '<br>DOMICILIO: ''</h5>
            </address>
          </header>
          <table class="meta">
            <tr>
              <th><span>Factura #</span></th>
              <td><span>' || V_ORDEN.ID_ORDEN || '</span></td>
            </tr>
            <tr>
              <th><span>Fecha Emisión</span></th>
              <td><span>' || TO_CHAR(V_ORDEN.FECHA_ORDEN, 'dd/mm/yyyy') || '</span></td>
            </tr>
            <tr>
              <th><span>Importe Total</span></th>
              <td><span id="prefix">Gs.</span><span>' || TO_CHAR(V_ORDEN.TOTAL, '999G999G999G999G990') || '</span></td>
            </tr>
          </table>
          <article>
            <table class="inventory">
              <thead>
                <tr>
                  <th><span>Cantidad</span></th>
                  <th><span>Descripción Detallada</span></th>
                  <th><span>Precio Unitario</span></th>
                </tr>
              </thead>
              <tbody>';
      
          FOR v_detalles IN cr_detalles(V_ORDEN.ID_ORDEN) LOOP
            v_retorno := v_retorno || '
            <tr>
              <td><span>' || TO_CHAR(v_detalles.cantidad) || '</span></td>
              <td><span>' || v_detalles.NOMBRE || '</span></td>
              <td><span data-prefix>Gs.</span><span>' || v_detalles.PRECIO_UNITARIO || '</span></td>
            </tr>';
          END LOOP;
      
          v_retorno := v_retorno || '
              </tbody>
            </table>
            <table class="balance">
              <tr>
                <th><span>Total a Pagar</span></th>
                <td><span data-prefix>Gs.</span><span>' || TO_CHAR(V_ORDEN.TOTAL, '999G999G999G999G990') || '</span></td>
              </tr>
            </table>
          </article>
          <aside>
            <h1><span contenteditable>Notas Adicionales</span></h1>
            <div contenteditable>
              <p>CONDICIÓN DE LA VENTA: <br>Atención: La validez de esta orden de venta es de 15 días. Por favor, confirme su pedido antes de la fecha de vencimiento para garantizar precios y disponibilidad.</p>
            </div>
          </aside>';
        END LOOP;
      
        RETURN v_retorno;
      END;
      

