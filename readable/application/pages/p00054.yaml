- # ====== Dynamic Action: Insertar Detalle ====================
  id: 11936802538860006
  identification: 
    name: Insertar Detalle

  execution: 
    sequence: 60
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: Agregar # 11936775803860005

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 11936948840860007
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        insert into DETALLE_ORDEN(id_orden, id_producto, cantidad, precio_unitario)
        values (:P54_ID_ORDEN,:P54_PRODUCTO,:P54_CANTIDAD,:P54_PRE_UNITARIO);
      items-to-submit: 
      - P54_ID_ORDEN
      - P54_PRODUCTO
      - P54_CANTIDAD
      - P54_PRE_UNITARIO

    execution: 
      sequence: 10
      event: Insertar Detalle # 11936802538860006
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute Server-side Code ====================
    id: 11937034738860008
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
            v_total number;
            BEGIN
            SELECT SUM(PRECIO_UNITARIO) 
                INTO v_total
                FROM DETALLE_ORDEN
                WHERE ID_ORDEN = :P54_ID_ORDEN;
        
                :P54_TOTAL := v_total;
            END;
      items-to-submit: 
      - P54_ID_ORDEN
      items-to-return: 
      - P54_TOTAL
      suppress-change-event: false

    execution: 
      sequence: 20
      event: Insertar Detalle # 11936802538860006
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

