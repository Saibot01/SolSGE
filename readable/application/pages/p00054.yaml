    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P54_TOTAL

    execution: 
      sequence: 30
      event: Insertar Detalle # 11936802538860006
      fire-when-event-result-is: True
      fire-on-initialization: false

