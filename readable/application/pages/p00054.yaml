- # ====== Process: Detalle Factura - Save Interactive Grid Data
  id: 11938657497860024
  identification: 
    name: Detalle Factura - Save Interactive Grid Data
    type: Interactive Grid - Automatic Row Processing (DML)
    execution-chain: None
    editable-region: Detalle Ventas # 11937687366860014

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      begin
          case:APEX$ROW_STATUS
              WHEN 'C' THEN
                  INSERT INTO DETALLE_ORDEN(ID_ORDEN,ID_PRODUCTO,CANTIDAD,PRECIO_UNITARIO,TOTAL)
                  VALUES (:P54_ID_ORDEN,:ID_PRODUCTO,:CANTIDAD,:PRECIO_UNITARIO,:TOTAL);
              WHEN 'U' THEN
                  UPDATE DETALLE_ORDEN
                  SET ID_PRODUCTO = :ID_PRODUCTO,
                      CANTIDAD = :CANTIDAD,
                      PRECIO_UNITARIO = :PRECIO_UNITARIO,
                      TOTAL = :TOTAL
                  WHERE ID_ORDEN = :P54_ID_ORDEN;
              WHEN 'D' THEN
                  DELETE DETALLE_ORDEN WHERE ID_ORDEN = :ID_ORDEN;
          END CASE;
      END;
    prevent-lost-updates: true
    lock-row: Yes

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    execution-scope: For Created and Modified Rows

