processes: 
- # ====== Process: Auditoria ==================================
  id: 20237399019558344
  identification: 
    name: Auditoria
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      -- INSERT: PK vacía = registro nuevo
      IF :P105_ID_PARAMETRO IS NULL THEN
        :P105_USUARIO_CREACION  := :APP_USER;
        :P105_FECHA_CREACION    := SYSDATE;
      END IF;
      
      -- Siempre en INSERT y UPDATE
      :P105_USUARIO_MODIFICACION := :APP_USER;
      :P105_FECHA_MODIFICACION   := SYSDATE;

  execution: 
    sequence: 5
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

