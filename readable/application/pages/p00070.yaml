- # ====== Process: Detalle_Compra - Save Interactive Grid Data 
  id: 13113340764342802
  identification: 
    name: Detalle_Compra - Save Interactive Grid Data
    type: Interactive Grid - Automatic Row Processing (DML)
    execution-chain: None
    editable-region: Detalle_Compra # 13113560524342804

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      begin
          case:APEX$ROW_STATUS
              WHEN 'C' THEN
                  INSERT INTO DETALLE_COMPROBANTE_PROV(ID_COMPROBANTE,ID_PRODUCTO,CANTIDAD,PRECIO_UNITARIO,TOTAL)
                  VALUES (:P70_ID_COMPROBANTE,:ID_PRODUCTO,:CANTIDAD,:PRECIO_UNITARIO,:TOTAL_DETALLE);
              WHEN 'U' THEN
                  UPDATE DETALLE_COMPROBANTE_PROV
                  SET ID_PRODUCTO = :ID_PRODUCTO,
                      CANTIDAD = :CANTIDAD,
                      PRECIO_UNITARIO = :PRECIO_UNITARIO,
                      TOTAL = :TOTAL_DETALLE
                  WHERE ID_COMPROBANTE = :P70_ID_COMPROBANTE;
              WHEN 'D' THEN
                  DELETE DETALLE_COMPROBANTE_PROV WHERE ID_COMPROBANTE = :P70_ID_COMPROBANTE;
          END CASE;
      END;
    prevent-lost-updates: true
    lock-row: Yes

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 12831283289386520
    execution-scope: For Created and Modified Rows

- # ====== Process: Detalle Factura Cursor =====================
  id: 13115355328342822
  identification: 
    name: Detalle Factura Cursor
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          CURSOR CUR_DETALLE IS
              SELECT DET.ID_ORDEN_COMPRA,
                     DET.ID_PRODUCTO,
                     DET.CANTIDAD,
                     DET.PRECIO_UNITARIO,
                     DET.TOTAL_DETALLE
              FROM ORDENES_COMPRA CAB,
                   DETALLE_ORDEN_COMPRA DET,
                   PRODUCTOS PR
              WHERE CAB.ID_ORDEN_COMPRA = DET.ID_ORDEN_COMPRA
                AND PR.ID_PRODUCTO = DET.ID_PRODUCTO
                AND DET.ID_ORDEN_COMPRA = :P70_ID_ORDEN_COMPRA;
      
          REG_DET CUR_DETALLE%ROWTYPE;
      BEGIN
          OPEN CUR_DETALLE;
          LOOP
              FETCH CUR_DETALLE INTO REG_DET;
              EXIT WHEN CUR_DETALLE%NOTFOUND;
      
              INSERT INTO DETALLE_COMPROBANTE_PROV (
                  ID_COMPROBANTE,
                  ID_PRODUCTO,
                  CANTIDAD,
                  PRECIO_UNITARIO,
                  TOTAL
              ) VALUES (
                  :P70_ID_COMPROBANTE, -- este debe estar definido en la página
                  REG_DET.ID_PRODUCTO,
                  REG_DET.CANTIDAD,
                  REG_DET.PRECIO_UNITARIO,
                  REG_DET.TOTAL_DETALLE
              );
      
          END LOOP;
          CLOSE CUR_DETALLE;
      
          apex_application.g_print_success_message := 
              'Se generó el comprobante correctamente a partir de la orden N° ' || :P70_ID_ORDEN_COMPRA;
      END;
      

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
