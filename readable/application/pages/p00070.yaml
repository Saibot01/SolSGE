- # ====== Dynamic Action: Carga de ID proveedor ===============
  id: 16598047857211748
  identification: 
    name: Carga de ID proveedor

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P70_ID_ORDEN_COMPRA

  actions: 
  - # ====== Action: SET PROVEEDOR ===============================
    id: 16598115173211749
    identification: 
      name: SET PROVEEDOR
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        SELECT OC.ID_PROVEEDOR --p.primer_nombre || ' ' || p.primer_apellido
        INTO :P70_ID_PROVEEDOR
        FROM ordenes_compra oc
        JOIN personas p
          ON p.ID_PERSONA = oc.ID_PROVEEDOR
        WHERE oc.ID_ORDEN_COMPRA = :P70_ID_ORDEN_COMPRA;
      items-to-submit: 
      - P70_ID_ORDEN_COMPRA
      items-to-return: 
      - P70_ID_PROVEEDOR
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Carga de ID proveedor # 16598047857211748
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

