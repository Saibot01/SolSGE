- # ====== Page Item: P78_COMPONENT_STATIC_ID ==================
  id: 14288785778158712
  identification: 
    name: P78_COMPONENT_STATIC_ID
    type: Popup LOV

  label: 
    label: Componente
    alignment: Left

  settings: 
    display-as: Inline Popup
    initial-fetch: Automatic
    manual-entry: false
    fetch-on-search: false

  search: 
    match-type: Contains
    case-sensitive: false
    minimum-characters: 0

  multiple-values: 
    type: No

  layout: 
    sequence: 40
    region: Recursos  Form # 14287220800158707
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    width: 32

  validation: 
    value-required: false
    maximum-length: 200

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT label d, comp_key r
      FROM (
        SELECT '['||region_name||'] Región' AS label, 'REG:'||region_name AS comp_key
        FROM apex_application_page_regions
        WHERE application_id = :P78_APP_ID
          AND page_id        = :P78_PAGE_ID
          AND region_name    IS NOT NULL
        UNION ALL
        SELECT '['||button_name||'] Botón', 'BTN:'||button_name
        FROM apex_application_page_buttons
        WHERE application_id = :P78_APP_ID
          AND page_id        = :P78_PAGE_ID
          AND button_name    IS NOT NULL
        UNION ALL
        SELECT '['||item_name||'] Ítem', 'ITEM:'||item_name
        FROM apex_application_page_items
        WHERE application_id = :P78_APP_ID
          AND page_id        = :P78_PAGE_ID
          AND item_name      IS NOT NULL
      )
      ORDER BY 1
      
    display-extra-values: true
    display-null-value: true

  cascading-list-of-values: 
    parent-item(s): 
    - P78_APP_ID
    - P78_PAGE_ID
    items-to-submit: 
    - P78_APP_ID
    - P78_PAGE_ID
    parent-required: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: Recursos  Form # 14287220800158707
    column: COMPONENT_STATIC_ID
    data-type: VARCHAR2
    query-only: false
    primary-key: false

