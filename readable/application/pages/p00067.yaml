- # ====== Process: Detalle Factura Cursor =====================
  id: 13117457362342843
  identification: 
    name: Detalle Factura Cursor
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          CURSOR CUR_DETALLE IS
              SELECT 
                ven.id_orden,
                pr.ID_PRODUCTO,
                pr.nombre,
                det.cantidad,
                det.precio_unitario,
                det.total,
                ti.descripcion AS iva,
                ti.porcentaje,
                ROUND((det.total * ti.porcentaje) / (100 + ti.porcentaje), 0) AS iva_calculado
              FROM detalle_orden det
              JOIN ordenes_venta ven ON ven.id_orden = det.id_orden
              JOIN productos pr ON pr.id_producto = det.id_producto
              LEFT JOIN tipo_iva ti ON ti.id_tipo_iva = pr.id_tipo_iva
              WHERE det.id_orden = :P67_ID_ORDEN_VENTA;
      
          REG_DET CUR_DETALLE%ROWTYPE;
      BEGIN
          OPEN CUR_DETALLE;
          LOOP
              FETCH CUR_DETALLE INTO REG_DET;
              EXIT WHEN CUR_DETALLE%NOTFOUND;
      
              INSERT INTO DETALLE_COMPROBANTE (
                  ID_COMPROBANTE,
                  ID_PRODUCTO,
                  CANTIDAD,
                  PRECIO_UNITARIO,
                  TOTAL_LINEA,
                  MONTO_IVA,
                  PORCENTAJE_IVA
              ) VALUES (
                  :P67_ID_COMPROBANTE, -- este debe estar definido en la página
                  REG_DET.ID_PRODUCTO,
                  REG_DET.CANTIDAD,
                  REG_DET.PRECIO_UNITARIO,
                  REG_DET.TOTAL,
                  REG_DET.IVA_CALCULADO,
                  REG_DET.PORCENTAJE
              );
      
          END LOOP;
          CLOSE CUR_DETALLE;
      
          apex_application.g_print_success_message :=
              'Se generó el comprobante correctamente a partir de la orden de venta N° ' || :P67_ID_ORDEN_VENTA;
      END;
      

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 12791467411370641

- # ====== Process: Validacion de Caja =========================
  id: 15465358937249346
  identification: 
    name: Validacion de Caja
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
          v_estado varchar2(1);
      
          BEGIN
              SELECT CA.ESTADO 
              INTO v_estado
              FROM CAJAS CA, EMPLEADOS EP
              WHERE EP.ID_EMPLEADO = CA.ID_EMPLEADO
              --AND EP.CODIGO_USUARIO = &APP_USER
              AND CA.ESTADO = 'A';
               EXCEPTION
                  WHEN NO_DATA_FOUND THEN
                  apex_application.g_print_success_message := '<span style="color: BLACK;"La caja no se encuentra Habilitada<br> </span>';
                  RAISE_APPLICATION_ERROR(-20000, 'Caja No Habilitada');
          END;

  execution: 
    sequence: 20
    point: Before Header
    run-process: Once Per Page Visit (default)

