- # ====== Dynamic Action: Cambio divisa =======================
  id: 13348467461104002
  identification: 
    name: Cambio divisa

  execution: 
    sequence: 110
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P67_TIPO_CAMBIO

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 13348506980104003
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
          v_local NUMBER;
          v_tc    NUMBER;
        BEGIN
          -- Convertir limpiando puntos y comas (miles o decimales)
          v_local := TO_NUMBER(REPLACE(REPLACE(:P67_TOTAL_MONEDA_LOCAL, '.', ''), ',', ''));
          v_tc    := TO_NUMBER(REPLACE(REPLACE(:P67_TIPO_CAMBIO, '.', ''), ',', ''));
        
          IF v_local IS NULL OR v_tc IS NULL OR v_tc = 0 THEN
            :P67_TOTAL_MONEDA_ORIGEN := NULL;
          ELSE
            :P67_TOTAL_MONEDA_ORIGEN := ROUND(v_local / v_tc, 2);
          END IF;
        END;
        
      items-to-submit: 
      - P67_TOTAL_MONEDA_LOCAL
      - P67_TIPO_CAMBIO
      items-to-return: 
      - P67_TOTAL_MONEDA_ORIGEN
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Cambio divisa # 13348467461104002
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

