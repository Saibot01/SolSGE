- # ====== Dynamic Action: New =================================
  id: 15277483644490612
  identification: 
    name: New

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: After Refresh
    selection-type: Region
    region: Detalle # 13352277251104040

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 15277555646490613
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var ig$ = apex.region("inventario_ig").widget();
        var view = ig$.interactiveGrid("getViews", "grid");
        var model = view.model;
        
        model.subscribe({
          onChange: function(changeType, change) {
            if (changeType === "edit") {
              var column = change.column;
              if (column !== "CANTIDAD_FISICA") {
                apex.message.showPageSuccess("Solo puede editar la cantidad física");
                model.setValue(change.recordId, column, change.oldValue); // revierte cambio
              }
            }
          }
        });
        

    affected-elements: 
      selection-type: Region
      region: Detalle # 13352277251104040

    execution: 
      sequence: 10
      event: New # 15277483644490612
      fire-when-event-result-is: True
      fire-on-initialization: false

- # ====== Dynamic Action: Precarga datos ======================
  id: 15280345400490641
  identification: 
    name: Precarga datos

  execution: 
    sequence: 30
    event-scope: Static

  when: 
    event: Page Load

  actions: 
  - # ====== Action: Setea Usuario ===============================
    id: 15280423188490642
    identification: 
      name: Setea Usuario
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: '&APP_USER.'
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P74_USUARIO_ENVIO

    execution: 
      sequence: 10
      event: Precarga datos # 15280345400490641
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Setea Fecha =================================
    id: 15280565273490643
    identification: 
      name: Setea Fecha
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT CURRENT_TIMESTAMP AT TIME ZONE 'America/Asuncion' AS fecha_paraguay
        FROM dual;
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
