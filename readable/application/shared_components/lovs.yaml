- # ====== List of Values: COMPONENTES =========================
  id: 14309889205348202
  identification: 
    name: COMPONENTES

  subscription: 
    version-number: 39020677653435

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT label d, comp_key r
      FROM (
        -- Regiones
        SELECT '['||region_name||'] Región' AS label,
               'REG:'||region_name          AS comp_key
        FROM apex_application_page_regions
        WHERE application_id = :APP_ID
          AND page_id        = :PAGE_ID
          AND region_name    IS NOT NULL
      
        UNION ALL
      
        -- Botones
        SELECT '['||button_name||'] Botón' AS label,
               'BTN:'||button_name         AS comp_key
        FROM apex_application_page_buttons
        WHERE application_id = :APP_ID
          AND page_id        = :PAGE_ID
          AND button_name    IS NOT NULL
      
        UNION ALL
      
        -- Ítems
        SELECT '['||item_name||'] Ítem'    AS label,
               'ITEM:'||item_name          AS comp_key
        FROM apex_application_page_items
        WHERE application_id = :APP_ID
          AND page_id        = :PAGE_ID
          AND item_name      IS NOT NULL
      )
      ORDER BY 1
      

  column-mapping: 
    return: R
    display: D
    default-sort: Use Order By from Query

