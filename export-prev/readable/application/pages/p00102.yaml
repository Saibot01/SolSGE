processes: 
- # ====== Process: Validar Token ==============================
  id: 16597762312211745
  identification: 
    name: Validar Token
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_emp EMPLEADOS%ROWTYPE;
      BEGIN
        IF :P102_TOKEN IS NULL THEN
          APEX_UTIL.REDIRECT_URL(
            APEX_PAGE.GET_URL(p_page => 9999)
          );
          RETURN;
        END IF;
      
        v_emp := PKG_EMPLEADOS.validar_token(:P102_TOKEN);
      
      EXCEPTION
        WHEN OTHERS THEN
          APEX_UTIL.REDIRECT_URL(
            APEX_PAGE.GET_URL(p_page => 9999)
          );
      END;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

- # ====== Process: Cambiar Contraseña =========================
  id: 16597839200211746
  identification: 
    name: Cambiar Contraseña
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        -- Validar que las contraseñas coincidan
        IF :P102_NUEVA_CONTRASENA IS NULL THEN
          APEX_ERROR.ADD_ERROR(
            p_message          => 'Debes ingresar una contraseña.',
            p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
          );
          RETURN;
        END IF;
      
        IF :P102_NUEVA_CONTRASENA != :P102_CONFIRMAR THEN
          APEX_ERROR.ADD_ERROR(
            p_message          => 'Las contraseñas no coinciden.',
            p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
          );
          RETURN;
        END IF;
      
        -- Cambiar contraseña (invalida el token automáticamente)
        PKG_EMPLEADOS.cambiar_contrasena(
          p_token            => :P102_TOKEN,
          p_nueva_contrasena => :P102_NUEVA_CONTRASENA
        );
      
        -- Redirigir al login con mensaje de éxito
        APEX_APPLICATION.G_PRINT_SUCCESS_MESSAGE :=
          'Contraseña establecida correctamente. Ya puedes iniciar sesión.';
      
        APEX_UTIL.REDIRECT_URL(
          APEX_PAGE.GET_URL(p_page => 9999)  -- número de tu página de login
        );
      
      EXCEPTION
        WHEN OTHERS THEN
          APEX_ERROR.ADD_ERROR(
            p_message          => SQLERRM,
            p_display_location => APEX_ERROR.C_INLINE_IN_NOTIFICATION
          );
      END;

  execution: 
    sequence: 10
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

