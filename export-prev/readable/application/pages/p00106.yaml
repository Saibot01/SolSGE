- # ====== Process: PROCESAR_DETALLE_RECEPCION =================
  id: 16595566588211723
  identification: 
    name: PROCESAR_DETALLE_RECEPCION
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_cant_a_recibir  NUMBER;
        v_id_det_oc       NUMBER;
        v_id_producto     NUMBER;
      BEGIN
        -- Si no hay filas en F01, no hacemos nada
        IF APEX_APPLICATION.G_F01.COUNT = 0 THEN
          RETURN;
        END IF;
      
        FOR i IN 1 .. APEX_APPLICATION.G_F01.COUNT LOOP
          -- Cantidad a recibir (puede venir vacía)
          v_cant_a_recibir := NVL(TO_NUMBER(APEX_APPLICATION.G_F01(i)), 0);
      
          -- Si no existe índice en F02 o F03, saltamos la fila
          IF APEX_APPLICATION.G_F02.COUNT < i
             OR APEX_APPLICATION.G_F03.COUNT < i
          THEN
            CONTINUE;
          END IF;
      
          v_id_det_oc   := TO_NUMBER(APEX_APPLICATION.G_F02(i));
          v_id_producto := TO_NUMBER(APEX_APPLICATION.G_F03(i));
      
          IF v_cant_a_recibir > 0 THEN
            INSERT INTO DETALLE_RECEPCION_COMPRA (
              ID_RECEPCION,
              ID_DETALLE_OC,
              ID_PRODUCTO,
              CANTIDAD_RECIBIDA
            ) VALUES (
              :P106_ID_RECEPCION,
              v_id_det_oc,
              v_id_producto,
              v_cant_a_recibir
            );
          END IF;
        END LOOP;
      END;
      

  execution: 
    sequence: 20
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: BT_GUARDAR # 16594209691211710

