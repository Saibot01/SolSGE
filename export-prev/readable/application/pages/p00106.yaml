validations: 
- # ====== Validation: VAL_AL_MENOS_UNA_CANTIDAD ===============
  id: 16595835231211726
  identification: 
    name: VAL_AL_MENOS_UNA_CANTIDAD

  execution: 
    sequence: 5

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      DECLARE
        l_count  PLS_INTEGER;
        l_val    VARCHAR2(4000);
      BEGIN
        -- Si no hay G_F01, consideramos que no hay datos
        l_count := NVL(APEX_APPLICATION.G_F01.COUNT, 0);
      
        IF l_count = 0 THEN
          RETURN FALSE;
        END IF;
      
        FOR i IN 1 .. l_count LOOP
          l_val := TRIM(APEX_APPLICATION.G_F01(i));
      
          -- Si el usuario escribió algo que no sea vacío ni "0"
          IF l_val IS NOT NULL AND l_val <> '0' THEN
            RETURN TRUE;
          END IF;
        END LOOP;
      
        -- Si llegamos hasta acá, todas las filas son NULL o "0"
        RETURN FALSE;
      
      EXCEPTION
        WHEN OTHERS THEN
          -- Si algo raro pasa, por seguridad consideramos que la validación falla
          RETURN FALSE;
      END;
    always-execute: false

  error: 
    error-message: Debes ingresar al menos una cantidad a recibir mayor a cero.
    display-location: Inline with Field and in Notification

  server-side-condition: 
    when-button-pressed: BT_GUARDAR # 16594209691211710

- # ====== Validation: VAL_CANTIDAD_NO_SUPERA_PENDIENTE ========
  id: 16595927755211727
  identification: 
    name: VAL_CANTIDAD_NO_SUPERA_PENDIENTE

  execution: 
    sequence: 8

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      DECLARE
        l_count   PLS_INTEGER;
        l_raw     VARCHAR2(4000);
        l_cant    NUMBER;
        l_pend    NUMBER;
      BEGIN
        -- Si no hay filas en F01, no validamos nada (la otra validación se encarga del "todo cero")
        l_count := NVL(APEX_APPLICATION.G_F01.COUNT, 0);
      
        IF l_count = 0 THEN
          RETURN TRUE;
        END IF;
      
        FOR i IN 1 .. l_count LOOP
          -- Si no hay pendiente para este índice, salimos del loop por seguridad
          IF APEX_APPLICATION.G_F04.COUNT < i THEN
            EXIT;
          END IF;
      
          l_raw := TRIM(APEX_APPLICATION.G_F01(i));
      
          -- Si está vacío, lo tratamos como 0
          IF l_raw IS NULL THEN
            l_cant := 0;
          ELSE
            -- Intentamos convertir a número
            BEGIN
              l_cant := TO_NUMBER(l_raw);
            EXCEPTION
              WHEN OTHERS THEN
                -- Si no es número válido, la validación falla
                RETURN FALSE;
            END;
          END IF;
      
          -- Pendiente (F04 viene del hidden que armamos)
          l_pend := NVL(TO_NUMBER(APEX_APPLICATION.G_F04(i)), 0);
      
          -- No permitir negativos ni superar pendiente
          IF l_cant < 0 THEN
            RETURN FALSE;
          ELSIF l_cant > l_pend THEN
            RETURN FALSE;
          END IF;
        END LOOP;
      
        RETURN TRUE;
      END;
    always-execute: false

  error: 
    error-message: La cantidad a recibir debe ser numérica, no negativa y no puede superar la cantidad pendiente.
    display-location: Inline with Field and in Notification

  server-side-condition: 
    when-button-pressed: BT_GUARDAR # 16594209691211710

processes: 
- # ====== Process: CARGAR_DATOS_OC ============================
  id: 14821769507450442
  identification: 
    name: CARGAR_DATOS_OC
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_nombre_proveedor PERSONAS.PRIMER_NOMBRE%TYPE;
      BEGIN
        -- Datos de la OC
        SELECT oc.ID_ORDEN_COMPRA,
               oc.FECHA_ORDEN,
               oc.ESTADO,
               oc.TOTAL_ORDEN,
               p.PRIMER_NOMBRE || ' ' || p.PRIMER_APELLIDO,
               CASE oc.ESTADO
                    WHEN 'P' THEN 'Pendiente'
                    WHEN 'R' THEN 'Recepción parcial'
                    WHEN 'C' THEN 'Completa'
                    WHEN 'A' THEN 'Anulada'
                    ELSE 'Desconocido'
               END
          INTO :P106_OC_NUMERO,
               :P106_OC_FECHA,
               :P106_ESTADO,
               :P106_OC_TOTAL,
               v_nombre_proveedor,
               :P106_ESTADO_TEXTO
          FROM ORDENES_COMPRA oc
          JOIN PERSONAS p
            ON p.ID_PERSONA = oc.ID_PROVEEDOR
         WHERE oc.ID_ORDEN_COMPRA = :P106_ID_ORDEN_COMPRA;
      
        :P106_OC_PROVEEDOR := v_nombre_proveedor;
      
        -- ✅ NUEVO: verificar que el comprobante pasado
        -- pertenezca a esta OC (validación de seguridad)
        BEGIN
          SELECT ID_COMPROBANTE
            INTO :P106_ID_COMPROBANTE
            FROM COMPROBANTES_PROVEEDOR
           WHERE ID_COMPROBANTE  = :P106_ID_COMPROBANTE
             AND ID_ORDEN_COMPRA = :P106_ID_ORDEN_COMPRA;
        EXCEPTION
          WHEN NO_DATA_FOUND THEN
            RAISE_APPLICATION_ERROR(-20001,
              'El comprobante no corresponde a esta Orden de Compra.');
        END;
      END;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

