- # ====== Region: Inventario - Detalle ========================
  id: 14772647860921552
  identification: 
    name: Inventario - Detalle
    type: Interactive Grid

  source: 
    location: Local Database
    type: Table / View
    table-owner: Parsing Schema
    table-name: INVENTARIO_DETALLE
    include-rowid-column: false
    where-clause: |
      ID_INVENTARIO = :P84_ID_INVENTARIO
      AND (
            :P84_ESTADO <> 'BORRADOR'
         OR ID_PRODUCTO IN (
              SELECT p.ID_PRODUCTO
                FROM PRODUCTOS p
                LEFT JOIN STOCK_PRODUCTO s
                       ON s.ID_PRODUCTO = p.ID_PRODUCTO
                      AND s.ID_OFICINA  = :P84_ID_OFICINA
               WHERE NVL(p.ACTIVO,'S') = 'S'
                 AND (:P84_FILTRO_CATEGORIA IS NULL OR p.ID_CATEGORIA = :P84_FILTRO_CATEGORIA)
                 AND (:P84_FILTRO_MARCA    IS NULL OR p.ID_MARCA     = :P84_FILTRO_MARCA)
                 AND ( :P84_SOLO_STOCK = 'N' OR NVL(s.CANTIDAD,0) > 0 )
            )
      )
      
    page-items-to-submit: 
    - P84_ID_INVENTARIO
    - P84_ESTADO
    - P84_ID_OFICINA
    - P84_FILTRO_CATEGORIA
    - P84_FILTRO_MARCA
    - P84_SOLO_STOCK

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

