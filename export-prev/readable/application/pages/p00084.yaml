- # ====== Dynamic Action: PRECARGAR ===========================
  id: 14818430227450409
  identification: 
    name: PRECARGAR

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: PRECARGAR # 14818371867450408

  actions: 
  - # ====== Action: Inserta en coleccion ========================
    id: 13351385864104031
    identification: 
      name: Inserta en coleccion
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        BEGIN
          apex_collection.create_or_truncate_collection('COL_INV_DETALLE');
        
          FOR r IN (
            SELECT p.id_producto,
                   p.nombre,
                   NVL(s.cantidad,0) AS stock
              FROM productos p
              LEFT JOIN stock_producto s
                     ON s.id_producto = p.id_producto
                    AND s.id_oficina = :P84_ID_OFICINA
             WHERE NVL(p.activo,'S') = 'S'
               AND (:P84_FILTRO_CATEGORIA IS NULL OR p.id_categoria = :P84_FILTRO_CATEGORIA)
               AND (:P84_FILTRO_MARCA    IS NULL OR p.id_marca     = :P84_FILTRO_MARCA)
               AND (:P84_SOLO_STOCK = 'N' OR NVL(s.cantidad,0) > 0)
          ) LOOP
            apex_collection.add_member(
              p_collection_name => 'COL_INV_DETALLE',
              p_n001 => r.id_producto,
              p_c001 => r.nombre,
              p_n002 => r.stock,
              p_n003 => 0,      -- cantidad física
              p_c002 => NULL,   -- observación
              p_c008 => 'C'     -- status: C = creado
            );
          END LOOP;
        END;
        
      items-to-submit: 
      - P84_FILTRO_CATEGORIA
      - P84_FILTRO_MARCA
      - P84_SOLO_STOCK
      - P84_ID_OFICINA

    execution: 
      sequence: 20
      event: PRECARGAR # 14818430227450409
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Insert ======================================
    id: 14818580978450410
    identification: 
      name: Insert
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        BEGIN
          INSERT INTO INVENTARIO_DETALLE (ID_INVENTARIO, ID_PRODUCTO, CANTIDAD_FISICA, OBSERVACION)
          SELECT :P84_ID_INVENTARIO,
                 p.ID_PRODUCTO,
                 0,
                 NULL
            FROM PRODUCTOS p
            LEFT JOIN STOCK_PRODUCTO s
                   ON s.ID_PRODUCTO = p.ID_PRODUCTO
                  AND s.ID_OFICINA  = :P84_ID_OFICINA
            LEFT JOIN INVENTARIO_DETALLE d
                   ON d.ID_INVENTARIO = :P84_ID_INVENTARIO
                  AND d.ID_PRODUCTO   = p.ID_PRODUCTO
           WHERE d.ID_INVENTARIO_DETALLE IS NULL
             AND NVL(p.ACTIVO,'S') = 'S'
             AND (:P84_FILTRO_CATEGORIA IS NULL OR p.ID_CATEGORIA = :P84_FILTRO_CATEGORIA)
             AND (:P84_FILTRO_MARCA    IS NULL OR p.ID_MARCA     = :P84_FILTRO_MARCA)
             AND ( :P84_SOLO_STOCK = 'N' OR NVL(s.CANTIDAD,0) > 0 );
        
          -- Opcional, pero útil en DA/AJAX para que el IG vea de inmediato los inserts:
          COMMIT;
        
          APEX_APPLICATION.G_PRINT_SUCCESS_MESSAGE := 'Líneas precargadas según filtros.';
          EXCEPTION
            WHEN OTHERS THEN
                APEX_ERROR.ADD_ERROR (
                    p_message => 'Error al precargar los productos: ' || SQLERRM,
                    p_display_location => APEX_ERROR.C_ON_ERROR_PAGE
                );
        END;
      items-to-submit: 
      - P84_ID_INVENTARIO
      - ' P84_ID_OFICINA'
      - ' P84_FILTRO_CATEGORIA'
      - ' P84_FILTRO_MARCA'
      - ' P84_SOLO_STOCK'

    execution: 
      sequence: 10
      event: PRECARGAR # 14818430227450409
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

    configuration: 
      build-option: Commented Out # 7705349298831252

  - # ====== Action: refresh =====================================
