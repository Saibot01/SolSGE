- # ====== Process: Inserta Detalle ============================
  id: 13351970876104037
  identification: 
    name: Inserta Detalle
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_rec apex_collections%ROWTYPE;
      BEGIN
        FOR l_rec IN (SELECT * FROM apex_collections
                       WHERE collection_name = 'COL_INV_DETALLE') LOOP
      
          CASE l_rec.c008
            WHEN 'C' THEN
              INSERT INTO inventario_detalle (
                id_inventario,
                id_producto,
                stock_sistema,
                cantidad_fisica,
                observacion
              )
              VALUES (
                :P84_ID_INVENTARIO,
                l_rec.n001,
                l_rec.n002,
                l_rec.n003,
                l_rec.c002
              );
      
            WHEN 'U' THEN
              UPDATE inventario_detalle
                 SET cantidad_fisica = l_rec.n003,
                     observacion     = l_rec.c002
               WHERE id_inventario = :P84_ID_INVENTARIO
                 AND id_producto   = l_rec.n001;
      
            WHEN 'D' THEN
              DELETE FROM inventario_detalle
               WHERE id_inventario = :P84_ID_INVENTARIO
                 AND id_producto   = l_rec.n001;
          END CASE;
      
        END LOOP;
        COMMIT;
      END;
      

