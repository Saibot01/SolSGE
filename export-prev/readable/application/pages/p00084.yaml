- # ====== Process: Inventario DE - Save Interactive Grid Data =
  id: 13350915027104027
  identification: 
    name: Inventario DE - Save Interactive Grid Data
    type: Interactive Grid - Automatic Row Processing (DML)
    execution-chain: None
    editable-region: Inventario DE # 13349996967104017

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      DECLARE
        l_rec apex_collections%ROWTYPE;  -- tipo basado en la tabla de vistas
      BEGIN
        FOR l_rec IN (SELECT * FROM apex_collections
                        WHERE collection_name = 'COL_INV_DETALLE') LOOP
      
          -- Usás los campos n001, c001, n002, etc. según lo definiste
          CASE l_rec.c008  -- supongamos que guardaste el status aquí: 'C','U','D'
            WHEN 'C' THEN
              INSERT INTO inventario_detalle (
                id_inventario,
                id_producto,
                stock_sistema,
                cantidad_fisica,
                observacion,
                id_sector,
                id_ubicacion
              )
              VALUES (
                :P84_ID_INVENTARIO,
                l_rec.n001,
                l_rec.n002,
                l_rec.n003,
                l_rec.c002,
                l_rec.n004,
                l_rec.n005
              );
      
            WHEN 'U' THEN
              UPDATE inventario_detalle
                   SET cantidad_fisica = l_rec.n003,
                     observacion     = l_rec.c002,
                     id_sector       = l_rec.n004,
                     id_ubicacion    = l_rec.n005
               WHERE id_inventario = :P84_ID_INVENTARIO
                 AND id_producto   = l_rec.n001;
      
            WHEN 'D' THEN
              DELETE FROM inventario_detalle
               WHERE id_inventario = :P84_ID_INVENTARIO
                 AND id_producto   = l_rec.n001;
          END CASE;
          INSERT INTO inventario_detalle (
                id_inventario,
                id_producto,
                stock_sistema,
                cantidad_fisica,
                observacion,
                id_sector,
                id_ubicacion
              )
              VALUES (
                :P84_ID_INVENTARIO,
                l_rec.n001,
                l_rec.n002,
                l_rec.n003,
                l_rec.c002,
                l_rec.n004,
                l_rec.n005
              );
        END LOOP;
      
        COMMIT;
      END;
      
    prevent-lost-updates: true
    lock-row: Yes

  execution: 
    sequence: 40
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Guardando Detalle

  error: 
    error-message: ERR
    display-location: Inline in Notification

