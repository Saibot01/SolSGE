- # ====== Process: Detalle_Orden_Compra - Save Interactive Grid
  id: 12858658201396846
  identification: 
    name: Detalle_Orden_Compra - Save Interactive Grid Data
    type: Interactive Grid - Automatic Row Processing (DML)
    execution-chain: None
    editable-region: Detalle_Orden_Compra # 12857668087396836

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      begin
          case:APEX$ROW_STATUS
              WHEN 'C' THEN
                  INSERT INTO DETALLE_ORDEN_COMPRA(ID_ORDEN_COMPRA,ID_PRODUCTO,CANTIDAD,PRECIO_UNITARIO,TOTAL_DETALLE)
                  VALUES (:P72_ID_ORDEN_COMPRA,:ID_PRODUCTO,:CANTIDAD,:PRECIO_UNITARIO,:TOTAL_DETALLE);
              WHEN 'U' THEN
                  UPDATE DETALLE_ORDEN_COMPRA
                  SET ID_PRODUCTO = :ID_PRODUCTO,
                      CANTIDAD = :CANTIDAD,
                      PRECIO_UNITARIO = :PRECIO_UNITARIO,
                      TOTAL_DETALLE = :TOTAL_DETALLE
                  WHERE ID_ORDEN_COMPRA = :P72_ID_ORDEN_COMPRA;
              WHEN 'D' THEN
                  DELETE DETALLE_ORDEN_COMPRA WHERE ID_DETALLE_OC = :ID_DETALLE_OC;
          END CASE;
      END;
    prevent-lost-updates: true
    lock-row: Yes

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    execution-scope: For Created and Modified Rows

