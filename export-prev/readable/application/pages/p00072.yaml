- # ====== Process: CHK_LIMITE_MONTO_MENSUAL ===================
  id: 20237728863558348
  identification: 
    name: CHK_LIMITE_MONTO_MENSUAL
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        l_limite     NUMBER;
        l_acumulado  NUMBER;
        l_disponible NUMBER;
        l_total_oc   NUMBER := NVL(:P72_TOTAL_ORDEN, 0);
      BEGIN
        l_limite := FN_GET_LIMITE_OC_MENSUAL(
          TO_CHAR(SYSDATE, 'MM'),
          TO_CHAR(SYSDATE, 'YYYY')
        );
      
        -- Sin límite configurado → no validar
        IF l_limite IS NULL THEN
          RETURN;
        END IF;
      
        -- Acumulado del mes, excluye anuladas y la OC actual
        SELECT NVL(SUM(TOTAL_ORDEN), 0)
        INTO   l_acumulado
        FROM   ORDENES_COMPRA
        WHERE  TRUNC(FECHA_ORDEN, 'MM') = TRUNC(SYSDATE, 'MM')
          AND  ESTADO != 'A'
          AND  ID_ORDEN_COMPRA != NVL(:P72_ID_ORDEN_COMPRA, -1);
      
        l_disponible := l_limite - l_acumulado;
      
        IF (l_acumulado + l_total_oc) > l_limite THEN
          APEX_ERROR.ADD_ERROR(
            P_MESSAGE          => 'Límite mensual de OC superado.'          ||
                                  ' Límite: $'      || TO_CHAR(l_limite,    'FM999G999G990') ||
                                  ' | Acumulado: $' || TO_CHAR(l_acumulado, 'FM999G999G990') ||
                                  ' | Esta OC: $'   || TO_CHAR(l_total_oc,  'FM999G999G990') ||
                                  ' | Disponible: $'|| TO_CHAR(l_disponible,'FM999G999G990'),
            P_DISPLAY_LOCATION => APEX_ERROR.C_INLINE_IN_NOTIFICATION
          );
        END IF;
      END;

  execution: 
    sequence: 1
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 12901430655928785

