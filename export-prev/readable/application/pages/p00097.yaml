  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      DECLARE
        CURSOR cr_comprobante IS
        SELECT 
          PE.PRIMER_NOMBRE || ' ' || PE.SEGUNDO_NOMBRE || ' ' ||
          PE.PRIMER_APELLIDO || ' ' || PE.SEGUNDO_APELLIDO AS PROVEEDOR,
          PE.NRO_DOCUMENTO AS RUC_PROVEEDOR,
          C.ID_COMPROBANTE,
          C.FECHA_EMISION,
          C.TOTAL_COMPROBANTE AS TOTAL,
          C.OBSERVACION,
          C.NRO_COMPROBANTE,
          C.NRO_TIMBRADO,
          C.MONEDA,
          C.TIPO_COMPROBANTE
        FROM COMPROBANTES_PROVEEDOR C
        JOIN PROVEEDORES PR ON PR.ID_PERSONA = C.ID_PROVEEDOR
        JOIN PERSONAS PE ON PE.ID_PERSONA = PR.ID_PERSONA
       WHERE C.ID_COMPROBANTE = :P97_ID_COMPROBANTE;  -- Parámetro de entrada
      
        CURSOR cr_detalles (p_id_comprobante NUMBER) IS
          SELECT 
            P.NOMBRE AS PRODUCTO,
            D.CANTIDAD,
            D.PRECIO_UNITARIO,
            D.TOTAL
          FROM DETALLE_COMPROBANTE_PROV D
          JOIN PRODUCTOS P ON P.ID_PRODUCTO = D.ID_PRODUCTO
         WHERE D.ID_COMPROBANTE = p_id_comprobante
         ORDER BY D.ID_DETALLE;
      
        v_html CLOB;
      BEGIN
        FOR v_comp IN cr_comprobante LOOP
          v_html := '
          <header>
            <h1>FACTURA DE COMPRA</h1>
            <address>
              <h5>RUC: 80004571-1<br>
              Denominación: SOLSGE<br>
              Dirección: Itauguá Km 25 Mboiy<br>
              Inicio Actividad: 31/10/2023</h5>
            </address>
            <h1>PROVEEDOR</h1>
            <address>
              <h5>
                RUC: ' || v_comp.RUC_PROVEEDOR || '<br>
                Razón Social: ' || v_comp.PROVEEDOR || '<br>
                Moneda: ' || v_comp.MONEDA || '
              </h5>
            </address>
          </header>
      
          <table class="meta">
            <tr>
              <th><span>Tipo Comprobante</span></th>
              <td><span>' || v_comp.TIPO_COMPROBANTE || '</span></td>
            </tr>
            <tr>
              <th><span>Nro. Comprobante</span></th>
              <td><span>' || v_comp.NRO_COMPROBANTE || '</span></td>
            </tr>
            <tr>
              <th><span>Nro. Timbrado</span></th>
              <td><span>' || v_comp.NRO_TIMBRADO || '</span></td>
            </tr>
            <tr>
              <th><span>Fecha Emisión</span></th>
              <td><span>' || TO_CHAR(v_comp.FECHA_EMISION, 'dd/mm/yyyy') || '</span></td>
            </tr>
            <tr>
              <th><span>Total</span></th>
              <td><span id="prefix">Gs.</span><span>' || TO_CHAR(v_comp.TOTAL, '999G999G999G999G990') || '</span></td>
            </tr>
          </table>
      
          <article>
            <table class="inventory">
              <thead>
                <tr>
                  <th><span>Cantidad</span></th>
                  <th><span>Producto</span></th>
                  <th><span>Precio Unitario</span></th>
                  <th><span>Total Línea</span></th>
                </tr>
              </thead>
              <tbody>';
      
          FOR v_det IN cr_detalles(v_comp.ID_COMPROBANTE) LOOP
            v_html := v_html || '
            <tr>
              <td><span>' || TO_CHAR(v_det.CANTIDAD) || '</span></td>
              <td><span>' || v_det.PRODUCTO || '</span></td>
              <td><span data-prefix>Gs.</span><span>' || TO_CHAR(v_det.PRECIO_UNITARIO, '999G999G990D00') || '</span></td>
              <td><span data-prefix>Gs.</span><span>' || TO_CHAR(v_det.TOTAL, '999G999G990D00') || '</span></td>
            </tr>';
          END LOOP;
      
          v_html := v_html || '
              </tbody>
            </table>
      
            <table class="balance">
              <tr>
                <th><span>Total a Pagar</span></th>
                <td><span data-prefix>Gs.</span><span>' || TO_CHAR(v_comp.TOTAL, '999G999G999G999G990') || '</span></td>
              </tr>
            </table>
          </article>
      
          <aside>
            <h1><span>Notas Adicionales</span></h1>
            <div>
              <p>' || NVL(v_comp.OBSERVACION, 'Sin observaciones') || '</p>
            </div>
          </aside>';
        END LOOP;
      
        RETURN v_html;
      END;
      

