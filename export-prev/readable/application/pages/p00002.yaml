dynamic-actions: 
- # ====== Dynamic Action: ASIGNAR_NOMBRE ======================
  id: 8322024915235928
  identification: 
    name: ASIGNAR_NOMBRE

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Column(s)
    interactive-grid: Empleados # 9477502012028231
    column(s): 
    - ID_PERSONA

  actions: 
  - # ====== Action: Set Value ===================================
    id: 8322156400235929
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        select primer_nombre||' '||primer_apellido 
        		--into :NOMBRE
        		from personas 
        		where ID_PERSONA = :ID_PERSONA;
                
      items-to-submit: 
      - ID_PERSONA
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Column(s)
      column(s): 
      - NOMBRE

    execution: 
      sequence: 10
      event: ASIGNAR_NOMBRE # 8322024915235928
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: ASIGNAR COD_USUARIO =================
  id: 8322234753235930
  identification: 
    name: ASIGNAR COD_USUARIO

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Column(s)
    interactive-grid: Empleados # 9477502012028231
    column(s): 
    - ID_PERSONA

  actions: 
  - # ====== Action: Set Value ===================================
    id: 8322385756235931
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT UPPER(SUBSTR(primer_nombre, 1, 1) || primer_apellido)
               --INTO v_codigo_usuario
                FROM personas
                where ID_PERSONA = :ID_PERSONA;
      items-to-submit: 
      - ID_PERSONA
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Column(s)
      column(s): 
      - CODIGO_USUARIO

    execution: 
      sequence: 10
      event: ASIGNAR COD_USUARIO # 8322234753235930
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

