processes: 
- # ====== Process: convertir_md5 ==============================
  id: 8320961433235917
  identification: 
    name: convertir_md5
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
      l_password raw(64) ; 
      begin 
        --apex_debug.message(p_message => 'Begin create_site_account', p_level => 3); 
       
       -- l_password := utl_raw.cast_to_raw(DBMS_RANDOM.string('x',10)); 
       select standard_hash(:P1_PASSWORD, 'MD5') into l_password from dual;
      
       :P1_PASSWORD := l_password;
      end;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

