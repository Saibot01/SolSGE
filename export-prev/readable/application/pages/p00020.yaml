dynamic-actions: 
- # ====== Dynamic Action: ASIGNAR_NOMBRE ======================
  id: 9716648712137614
  identification: 
    name: ASIGNAR_NOMBRE

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P20_ID_PERSONA

  actions: 
  - # ====== Action: Set Value ===================================
    id: 9716760404137615
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        select primer_nombre||' '||primer_apellido 
        		--into :NOMBRE
        		from personas 
        		where ID_PERSONA = :P20_ID_PERSONA;
                
      items-to-submit: 
      - P20_ID_PERSONA
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P20_NOMBRE

    execution: 
      sequence: 10
      event: ASIGNAR_NOMBRE # 9716648712137614
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: ASIGNAR COD_USUARIO =================
  id: 9716819969137616
  identification: 
    name: ASIGNAR COD_USUARIO

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P20_ID_PERSONA

  actions: 
  - # ====== Action: Set Value ===================================
    id: 9716986940137617
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT UPPER(SUBSTR(primer_nombre, 1, 1) || primer_apellido)
               --INTO v_codigo_usuario
                FROM personas
                where ID_PERSONA = :P20_ID_PERSONA;
      items-to-submit: 
      - P20_ID_PERSONA
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P20_CODIGO_USUARIO

    execution: 
      sequence: 10
      event: ASIGNAR COD_USUARIO # 9716819969137616
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

