- # ====== Process: Registrar Empleado =========================
  id: 16597366208211741
  identification: 
    name: Registrar Empleado
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE
        v_id EMPLEADOS.ID_EMPLEADO%TYPE;
      BEGIN
        APEX_DEBUG.MESSAGE('Iniciando registro - ID_PERSONA: ' || :P20_ID_PERSONA);
        
        PKG_EMPLEADOS.registrar_empleado(
          p_id_persona  => :P20_ID_PERSONA,
          p_nombre      => :P20_NOMBRE,
          p_cargo       => :P20_CARGO,
          p_correo      => :P20_CORREO,
          p_url_reset   => 'https://gd48788b1691042-orapdbtes.adb.sa-vinhedo-1.oraclecloudapps.com/ords/r/workplace/solsge/reset-password',
          p_id_empleado => v_id
        );
      
        :P20_ID_EMPLEADO := v_id;
      
        APEX_APPLICATION.G_PRINT_SUCCESS_MESSAGE :=
          'Empleado registrado. Credenciales enviadas a ' || :P20_CORREO;
      
      EXCEPTION
        WHEN OTHERS THEN
          RAISE_APPLICATION_ERROR(-20099, 'Error: ' || SQLERRM);
      END;

  execution: 
    sequence: 5
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    error-message: Error registrando el empleado
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 11514366380464573
    type: Item is NULL
    item: P20_ID_EMPLEADO

