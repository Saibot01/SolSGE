dynamic-actions: 
- # ====== Dynamic Action: Precarga datos ======================
  id: 15280611627490644
  identification: 
    name: Precarga datos

  execution: 
    sequence: 20
    event-scope: Static

  when: 
    event: Page Load

  actions: 
  - # ====== Action: Setea Usuario ===============================
    id: 15280787238490645
    identification: 
      name: Setea Usuario
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: '&APP_USER.'
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P85_USUARIO_APROBACION

    execution: 
      sequence: 10
      event: Precarga datos # 15280611627490644
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Setea Fecha =================================
    id: 15280891558490646
    identification: 
      name: Setea Fecha
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT CURRENT_TIMESTAMP AT TIME ZONE 'America/Asuncion' AS fecha_paraguay
        FROM dual;
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P85_FECHA_APROBACION

    execution: 
      sequence: 20
      event: Precarga datos # 15280611627490644
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

