    language: PL/SQL
    pl/sql-code: |
      BEGIN
           INVENTARIO_PKG.APROBAR(:P85_ID_INVENTARIO, :P85_USUARIO_APROBACION);
           apex_application.g_print_success_message := 'Inventario aprobado.';
      
