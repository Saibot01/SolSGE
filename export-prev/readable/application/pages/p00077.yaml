    layout: 
      sequence: 50
      column-alignment: start
      stretch: Use Report Setting

    accessibility: 
      value-identifies-row: false

    validation: 
      value-required: false
      maximum-length: 200

    list-of-values: 
      type: SQL Query
      sql-query: |
        SELECT label d, comp_key r
        FROM (
          SELECT '['||region_name||'] Región' AS label, 'REG:'||region_name AS comp_key
          FROM apex_application_page_regions
          WHERE application_id = :APP_ID
              AND page_id        = :PAGE_ID
            AND region_name    IS NOT NULL
          UNION ALL
          SELECT '['||button_name||'] Botón', 'BTN:'||button_name
          FROM apex_application_page_buttons
          WHERE application_id = :APP_ID
              AND page_id        = :PAGE_ID
            AND button_name    IS NOT NULL
          UNION ALL
          SELECT '['||item_name||'] Ítem', 'ITEM:'||item_name
          FROM apex_application_page_items
          WHERE application_id = :APP_ID
              AND page_id        = :PAGE_ID
            AND item_name      IS NOT NULL
        )
        ORDER BY 1
        
      display-extra-values: true
      display-null-value: true

    cascading-list-of-values: 
      parent-column(s): 
      - PAGE_ID
      parent-required: true

    source: 
      type: Database Column
      database-column: COMPONENT_STATIC_ID
      data-type: VARCHAR2
      query-only: false
      primary-key: false

