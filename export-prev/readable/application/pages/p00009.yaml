    type: SQL Query
    sql-query: |
      select ID_PERSONA,
             NRO_DOCUMENTO,
             TIPO_DOCUMENTO,
             FECHA_VENCIMIENTO,
             TIPO_PERSONA,
             SEXO,
             --PRIMER_NOMBRE,
             --SEGUNDO_NOMBRE,
             --PRIMER_APELLIDO,
             --SEGUNDO_APELLIDO,
             primer_nombre || ' ' || NVL(segundo_nombre, '') || ' ' || primer_apellido || ' ' || NVL(segundo_apellido, '') as nombre,
             ESTADO_CIVIL,
             CORREO,
             FECHA_NACIMIENTO,
