processes: 
- # ====== Process: Monedas - Save Interactive Grid Data =======
  id: 12007270891524741
  identification: 
    name: Monedas - Save Interactive Grid Data
    type: Interactive Grid - Automatic Row Processing (DML)
    execution-chain: None
    editable-region: Monedas # 12006418683524733

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      begin
          case:APEX$ROW_STATUS
              WHEN 'C' THEN
                  INSERT INTO CAJA_MONEDAS(ID_CAJA,MONEDA,MONTO_APERTURA,MONTO_CIERRE)
                  VALUES (:P65_ID_CAJA,:MONEDA,:MONTO_APERTURA,:MONTO_CIERRE);
              WHEN 'U' THEN
                  UPDATE CAJA_MONEDAS
                  SET MONEDA = :MONEDA,
                      MONTO_APERTURA = :MONTO_APERTURA,
                      MONTO_CIERRE = :MONTO_CIERRE
                  WHERE ID_CAJA = :P65_ID_CAJA;
              WHEN 'D' THEN
                  DELETE CAJA_MONEDAS WHERE ID_CAJA = :P65_ID_CAJA;
          END CASE;
      END;
    prevent-lost-updates: true
    lock-row: Yes

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    execution-scope: For Created and Modified Rows

