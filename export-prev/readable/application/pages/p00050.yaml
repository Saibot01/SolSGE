validations: 
- # ====== Validation: VAL_STOCK_MIN_MAX =======================
  id: 20484872295037139
  identification: 
    name: VAL_STOCK_MIN_MAX

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      BEGIN
        IF :P50_STOCK_MINIMO IS NOT NULL AND :P50_STOCK_MAXIMO IS NOT NULL THEN
          IF :P50_STOCK_MINIMO >= :P50_STOCK_MAXIMO THEN
            RETURN 'El stock mínimo (' || :P50_STOCK_MINIMO || 
                   ') debe ser menor al stock máximo (' || :P50_STOCK_MAXIMO || ').';
          END IF;
        END IF;
        RETURN NULL;
      END;
    always-execute: false

  error: 
    display-location: Inline with Field and in Notification
    associated-item: P50_STOCK_MAXIMO # 20482286435037113

  server-side-condition: 
    when-button-pressed: SAVE # 12135500938681066

