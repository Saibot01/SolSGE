    default: 
      value: '#3085d6'

    condition: 
      depending-on-custom-attribute: OK Button # 44383014464856894
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

  - # ====== Custom Attribute: Position ==========================
    id: 45766260118548640
    identification: 
      attribute: 14
      name: Position
      scope: Component

    layout: 
      sequence: 22

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: center

    help: 
      help-text: To manage the popup window position, can be 'Top', 'Top Start', 'Top End', 'Center', 'Center Start', 'Center End', 'Bottom', 'Bottom Start', or 'Bottom End'.

    examples: 
