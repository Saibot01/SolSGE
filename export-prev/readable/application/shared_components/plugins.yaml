- # ====== Plugin: Bootstrap Carousel Extension ================
  id: 710321987001341839
  identification: 
    name: Bootstrap Carousel Extension
    internal-name: ORCLKING.BOOTSTRAP.CAROUSEL.EXTENSION
    type: Region

  advanced: 
    quick-pick: false

  subscription: 
    version-number: 39017542615990

  source: 
    pl/sql-code: |
      FUNCTION render_bootstrap_carousel (p_region              IN apex_plugin.t_region, 
                                      p_plugin              IN apex_plugin.t_plugin, 
                                      p_is_printer_friendly IN boolean) 
      RETURN apex_plugin.t_region_render_result 
      AS 
        subtype plugin_attr IS VARCHAR2(32767); 
        l_column_value_list apex_plugin_util.t_column_value_list; 
        l_region            VARCHAR2(100); -- To keep region static id 
        l_data              CLOB; -- To store column values 
        l_html_body         CLOB;
        l_img_height        apex_application_page_regions.attribute_01%TYPE:= p_region.attribute_01;
        l_img_width         apex_application_page_regions.attribute_02%TYPE:= p_region.attribute_02;
        l_pause             apex_application_page_regions.attribute_03%TYPE:= p_region.attribute_03;
        l_interval          apex_application_page_regions.attribute_04%TYPE:= p_region.attribute_04;
        l_border_radius     apex_application_page_regions.attribute_05%TYPE:= p_region.attribute_05;
        l_class             VARCHAR2(100);
        l_row_count         NUMBER;
      BEGIN 
          -- Debug information will be logged when application's debug mode enabled 
          IF apex_application.g_debug THEN 
            apex_plugin_util.debug_region (p_plugin => p_plugin, p_region => p_region, 
            p_is_printer_friendly => p_is_printer_friendly); 
          END IF;
          
          -- Get region static id  
          l_region := CASE 
                        WHEN p_region.static_id IS NOT NULL THEN p_region.static_id 
                        ELSE 'R' 
                             ||p_region.ID 
                      END; 
      
          -- Get data from region source (sql query) 
          l_column_value_list := apex_plugin_util.get_data ( p_sql_statement => p_region.SOURCE, 
                                                             p_min_columns => 2, 
                                                             p_max_columns => 2, 
                                                             p_component_name => p_region.NAME); 
          
          
        
         l_html_body := '<!DOCTYPE html>
      <html lang="en">
      <head>
        <title>Bootstrap Example</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
      </head>
      <body>
      
      <div class="container">
        <div id="myCarousel_'||l_region||'" class="carousel slide" %INTERVAL% %PAUSE% style="width: '||nvl(l_img_width,600)||'px;">
          <!-- Indicators -->
          <ol class="carousel-indicators">';
          
       FOR i IN 1..l_column_value_list(1).count loop
          l_class := case when i = 1 then 'class="active"' else null end;
          l_row_count := case when i = 1 then 0 else i-1 end;
          l_html_body := l_html_body ||' '||case when l_row_count = 0 then '<li data-target="#myCarousel_'||l_region||'" data-slide-to="'||l_row_count||'" class="active"></li>'
          else '<li data-target="#myCarousel_'||l_region||'" data-slide-to="'||l_row_count||'"></li>'
          end;
         
        END loop;
        
             l_html_body := l_html_body ||' '||'</ol> <div class="carousel-inner" style="border-radius:'||nvl(l_border_radius,0)||'px;">';
             
             FOR j IN 1..l_column_value_list(1).count loop
             
          
          l_html_body := l_html_body ||' '||case when j = 1 then '<div class="item active">
              <img src="'||l_column_value_list(2)(j)||'"style="width:100%;height:'||nvl(l_img_height,300)||'px;border-radius:'||nvl(l_border_radius,0)||'px;">
            </div>' else '<div class="item">
              <img src="'||l_column_value_list(2)(j)||'"style="width:100%;height:'||nvl(l_img_height,300)||'px;border-radius:'||nvl(l_border_radius,0)||'px;">
            </div>' end;
          
        END loop;
        
        l_html_body := l_html_body ||' '||'</div>
      
          <!-- Left and right controls -->
          <a class="left carousel-control" href="#myCarousel_'||l_region||'" data-slide="prev" style="border-radius:'||nvl(l_border_radius,0)||'px;">
            <span class="glyphicon glyphicon-chevron-left"></span>
            <span class="sr-only">Previous</span>
          </a>
          <a class="right carousel-control" href="#myCarousel_'||l_region||'" data-slide="next" style="border-radius:'||nvl(l_border_radius,0)||'px;">
            <span class="glyphicon glyphicon-chevron-right"></span>
            <span class="sr-only">Next</span>
          </a>
        </div>
      </div>
      </body>
      </html>';
      
         
      
       IF l_interval IS NULL THEN
                  l_html_body := REPLACE(l_html_body, '%INTERVAL%', 'data-ride="carousel"');
            ELSE
                  l_html_body := REPLACE(l_html_body, '%INTERVAL%', 'data-interval="' || l_interval*1000 ||'"' || 'data-ride="carousel"');
            END IF; 
            
            IF l_pause = 'Y' THEN
                  l_html_body := REPLACE(l_html_body, '%PAUSE%', 'data-pause="hover"');
            ELSE
                  l_html_body := REPLACE(l_html_body, '%PAUSE%', 'data-pause=""');
            END IF;  
            
            -- Load CSS File
            apex_css.add_file(
               p_name      => 'bootstrap.min',
               p_directory => p_plugin.file_prefix,
               p_version   => NULL
            );  -- Load bootstrap.min.css
            
            -- Load javascript Libraries
            apex_javascript.add_library(
                p_name => 'bootstrap.min',
                p_directory => p_plugin.file_prefix,
                p_version => null); -- Load bootstrap.min.js
                
                -- Load javascript Libraries
            apex_javascript.add_library(
                p_name => 'jquery.min',
                p_directory => p_plugin.file_prefix,
                p_version => null); -- Load bootstrap.min.js
                
          sys.htp.p(l_html_body); 
          
          RETURN NULL; 
      END render_bootstrap_carousel; 

  callbacks: 
    api-interface: Function
    render-procedure/function-name: render_bootstrap_carousel

