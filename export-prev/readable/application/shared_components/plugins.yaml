- # ====== Plugin: KEBE.DASHBOARD ==============================
  id: 22968942525547329
  identification: 
    name: KEBE.DASHBOARD
    internal-name: THEME_42$KEBE_DASHBOARD
    theme: Universal Theme # 42
    type: Template Component

  advanced: 
    quick-pick: false

  subscription: 
    version-number: 39016828282546

  templates: 
    available-as: 
    - Single (Partial)
    - Multiple (Report)
    partial: |
      {if APEX$IS_LAZY_LOADING/}
        <p>loading...</p>
       
      {else/}
      
       
                 
                
                <div class="bg-clip-border mx-4 rounded-xl overflow-hidden bg-gradient-to-tr from-#IMAGE_COLOR#-600 to-#IMAGE_COLOR#-400 text-white shadow-#IMAGE_COLOR#-500/40 shadow-lg absolute -mt-4 grid h-16 w-16 place-items-center">
                  <img src="#IMAGE_URL#" class="w-6 h-6 text-white"> </img>
                </div>
                <div class="p-4 text-right">
                  <p class="block antialiased font-sans text-sm leading-normal font-normal text-blue-gray-600">#TITLE#</p>
                  <h4 class="block antialiased tracking-normal font-sans text-2xl font-semibold leading-snug text-blue-gray-900">#VALUE#</h4>
                </div>
                <div class="border-t border-blue-gray-50 p-4">
                  <p class="block antialiased font-sans text-base leading-relaxed font-normal text-blue-gray-600">
                    <strong class="text-#PERCENT_COLOR#-500">#PERCENT#</strong>&nbsp;#FOOTER#
                  </p>
                </div>
      
        
      {endif/}
    report-body: |2
              <div class="mt-12 mb-12 grid gap-y-10 gap-x-6 md:grid-cols-2 xl:grid-cols-4" >#APEX$ROWS#</div>
      
      
      
    report-row: '<div class="relative flex flex-col bg-clip-border rounded-xl bg-white text-gray-700 shadow-md"  #APEX$ROW_IDENTIFICATION# >#APEX$PARTIAL#</div>'
    translate-templates: false
    default-escape-mode: HTML
    number-of-lazy-loading-skeletons: 3

  callbacks: 
    api-interface: Procedure with Legacy Attributes [deprecated]

  custom-attributes: 
    substitute-attribute-values: true

