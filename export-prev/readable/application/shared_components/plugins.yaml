- # ====== Plugin: Sweet Alert =================================
  id: 44301152978259047
  identification: 
    name: Sweet Alert
    internal-name: BBE_SWEET_ALERT
    type: Dynamic Action

  advanced: 
    category: Notification
    quick-pick: false

  subscription: 
    version-number: 41136746102695

  callbacks: 
    api-interface: Function
    render-procedure/function-name: bbe_plugin.render

  standard-attributes: 
    attributes: 
    - Check "Fire on Initialization"
    - Has "Initialization JavaScript Code" Attribute

  custom-attributes: 
    substitute-attribute-values: true

  css: 
    file-urls: 
    - '#PLUGIN_FILES#sweetalert2.min.css'

  javascript: 
    file-urls: 
    - '#PLUGIN_FILES#sweetalert2.all.min.js'
    - '#PLUGIN_FILES#bbesweetalertPlugin#MIN#.js'

  information: 
    version: 1.0
    about-url: 'https://github.com/APEX88/bbe-sweet-alert-2'
    help-text: 'A beautiful, responsive, customizable Oracle APEX dynamic action plug-in built on top of the SweetAlert2 library https://sweetalert2.github.io/'

  comments: 
    comments: 'A beautiful, responsive, customizable Oracle APEX dynamic action plug-in built on top of the SweetAlert2 library https://sweetalert2.github.io/'

  standard-attributes: 
  - # ====== Standard Attribute: INIT_JAVASCRIPT_CODE ============
    id: 44301429944259054
    identification: 
      name: INIT_JAVASCRIPT_CODE

    value: 
      required: false

  custom-attributes: 
  - # ====== Custom Attribute: Timer =============================
    id: 34664051673159372
    identification: 
      attribute: 11
      name: Timer
      scope: Component

    layout: 
      sequence: 110

    settings: 
      type: Number
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: 1500

    condition: 
      depending-on-custom-attribute: OK Button # 44383014464856894
      depending-on-condition-type: equal to
      expression: N
      always-evaluate: true

    help: 
      help-text: Auto close timer of the popup. Set in ms (milliseconds)

  - # ====== Custom Attribute: Timer Progress Bar ================
    id: 34668221511168394
    identification: 
      attribute: 12
      name: Timer Progress Bar
      scope: Component

    layout: 
      sequence: 120

    settings: 
      type: Yes/No
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    default: 
      value: N

    condition: 
      depending-on-custom-attribute: Timer # 34664051673159372
      depending-on-condition-type: NOT_NULL
      always-evaluate: true

    help: 
      help-text: If set to true, the timer will have a progress bar at the bottom of a popup. Mostly, this feature is useful with toasts (as notification).

  - # ====== Custom Attribute: Toast =============================
    id: 34678649541270555
    identification: 
      attribute: 13
      name: Toast
      scope: Component

    layout: 
      sequence: 105

    settings: 
      type: Yes/No
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    default: 
      value: N

    condition: 
      depending-on-custom-attribute: OK Button # 44383014464856894
      depending-on-condition-type: equal to
      expression: N
      always-evaluate: true

    help: 
      help-text: Whether or not an alert should be treated as a toast notification. This option is normally coupled with the position (top end) and a timer parameter.

  - # ====== Custom Attribute: Title =============================
    id: 44305160261268457
    identification: 
      attribute: 1
      name: Title
      scope: Component

    layout: 
      sequence: 10

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: false
      translatable: true

    help: 
      help-text: The title of the Alert

  - # ====== Custom Attribute: Message ===========================
    id: 44305491035269073
    identification: 
      attribute: 2
      name: Message
      scope: Component

    layout: 
      sequence: 20

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: true
      translatable: true

    default: 
      value: my message ....

    help: 
      help-text: The required message of the Alert

  - # ====== Custom Attribute: Icon List =========================
    id: 44305754302270949
    identification: 
      attribute: 3
      name: Icon List
      scope: Component

    layout: 
      sequence: 30

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: info

    condition: 
      depending-on-custom-attribute: Icon # 44344196498903928
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

    help: 
      help-text: Predefined most used icons and associated colors (Success, Error, Warning, Information or Question)

    entries: 
    - # ====== Entry: Success ======================================
      id: 44306013428271528
      entry: 
        sequence: 10
        display: Success
        return: success

      advanced: 
        quick-pick: false

    - # ====== Entry: Error ========================================
      id: 44306420289271980
      entry: 
        sequence: 20
        display: Error
        return: error

      advanced: 
        quick-pick: false

    - # ====== Entry: Warning ======================================
      id: 44306838240272548
      entry: 
        sequence: 30
        display: Warning
        return: warning

      advanced: 
        quick-pick: false

    - # ====== Entry: Information ==================================
      id: 44307194593273213
      entry: 
        sequence: 40
        display: Information
        return: info

      advanced: 
        quick-pick: false

    - # ====== Entry: Question =====================================
      id: 44307598205273743
      entry: 
        sequence: 50
        display: Question
        return: question

      advanced: 
        quick-pick: false

  - # ====== Custom Attribute: Icon Color ========================
    id: 44308188628276772
    identification: 
      attribute: 4
      name: Icon Color
      scope: Component

    layout: 
      sequence: 40

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    condition: 
      depending-on-custom-attribute: Icon # 44344196498903928
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

    help: 
      help-text: Modify the color of the selected Icon (List or Font Class)

    examples: 
      examples: |
        To modify the color of an Icon; enter either the color name, hexa code or CSS variable as in the example bellow :
        <ul>
        <li>Color name   : Orange</li>
        <li>Hexa code    : #e18212</li>
        <li>CSS variable : var(--rw-palette-orange-80)</li>
        </ul>

  - # ====== Custom Attribute: Icon Animation ====================
    id: 44308768055281141
    identification: 
      attribute: 6
      name: Icon Animation
      scope: Component

    layout: 
      sequence: 60

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: true

    condition: 
      depending-on-custom-attribute: Icon # 44344196498903928
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

    help: 
      help-text: To animate either the Icon List or Font Class, by default is set to Yes (true)

    examples: 
      examples: In case of Font Class (custom), you can pick between Font List (Error, Warning, Information, Question) to apply the same animation effect.

    entries: 
    - # ====== Entry: Yes ==========================================
      id: 44308994850281866
      entry: 
        sequence: 10
        display: Yes
        return: true

      advanced: 
        quick-pick: false

    - # ====== Entry: No ===========================================
      id: 44309453052282696
      entry: 
        sequence: 20
        display: No
        return: false

      advanced: 
        quick-pick: false

  - # ====== Custom Attribute: Font Class ========================
    id: 44319333081593650
    identification: 
      attribute: 5
      name: Font Class
      scope: Component

    layout: 
      sequence: 35

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    condition: 
      depending-on-custom-attribute: Icon # 44344196498903928
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

    help: 
      help-text: |
        https://apex.oracle.com/pls/apex/r/apex_pm/ut211/icons
        <BR>Font APEX icons - There are over 1150 icons in Font APEX, and there are 25 modifiers you can place on top of any existing icons so you can customize any icon to fit your needs

    examples: 
      examples: fa fa-404 fa-2x

  - # ====== Custom Attribute: Icon ==============================
    id: 44344196498903928
    identification: 
      attribute: 7
      name: Icon
      scope: Component

    layout: 
      sequence: 25

    settings: 
      type: Yes/No
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    default: 
      value: Y

    help: 
      help-text: To have an Icon or not in the alert.

  - # ====== Custom Attribute: OK Button =========================
    id: 44383014464856894
    identification: 
      attribute: 8
      name: OK Button
      scope: Component

    layout: 
      sequence: 80

    settings: 
      type: Yes/No
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    default: 
      value: Y

  - # ====== Custom Attribute: OK Label ==========================
    id: 44383772215859976
    identification: 
      attribute: 9
      name: OK Label
      scope: Component

    layout: 
      sequence: 90

    settings: 
      type: Text
      common: true
      show-in-wizard: true
      required: false
      translatable: true

    default: 
      value: OK

    condition: 
      depending-on-custom-attribute: OK Button # 44383014464856894
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

  - # ====== Custom Attribute: OK Color ==========================
    id: 44394828713967137
    identification: 
